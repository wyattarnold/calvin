# Default configuration for calvin-eopc.py
# This file is copied to my-models/calvin-eopc/config.toml on first run.
# Edit the model-dir copy to customise a specific experiment.

[run]
solver       = "highs"
data_path    = "../calvin-network-data/data"
eop_fraction = 0.1  # fraction of capacity used as end-of-period storage lower bound

[network]
# Per-node storage lower bound overrides (TAF).
[network.node_lb_overrides]
